<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NYT 100 Best Books Tracker</title>
<style>
  :root {
    --bg: #252525;
    --surface: #2E2E2E;
    --card: #383838;
    --accent: #D4B35A;
    --accent-dim: #9A8040;
    --text: #F2EFE8;
    --text-muted: #9E9994;
    --border: #444444;
    --read-bg: #1E3320;
    --read-border: #3A7040;
    --read-text: #7DD67D;
    --star-on: #C8A951;
    --star-off: #333;
    --font-serif: Georgia, 'Times New Roman', serif;
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --font-mono: 'Courier New', monospace;
    --r: 6px;
    --tr: 0.16s ease;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-sans); font-size: 15px; min-height: 100vh; }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 28px 16px;
    position: sticky; top: 0; z-index: 100;
  }
  .header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
  h1 { font-family: var(--font-serif); font-size: clamp(16px,2.5vw,22px); font-weight: normal; }
  h1 span { color: var(--accent); }

  /* ── List Tabs ── */
  .list-tabs { display: flex; gap: 4px; }
  .list-tab {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--r);
    color: var(--text-muted); cursor: pointer; font-size: 12px; font-weight: 600;
    padding: 6px 16px; transition: all var(--tr); font-family: var(--font-sans);
    letter-spacing: 0.04em;
  }
  .list-tab:hover { border-color: var(--accent-dim); color: var(--text); }
  .list-tab.active { background: var(--accent); border-color: var(--accent); color: #0F0F0F; }
  .tab-badge {
    display: inline-block; background: rgba(0,0,0,0.25); border-radius: 10px;
    font-size: 10px; padding: 1px 6px; margin-left: 5px;
  }
  .list-tab.active .tab-badge { background: rgba(0,0,0,0.2); }
  .list-desc { font-size: 11px; color: var(--text-muted); margin-left: auto; font-style: italic; }

  /* ── Stats Bar ── */
  .stats-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 28px;
    display: flex; gap: 0; align-items: stretch; flex-wrap: wrap;
  }
  .stat-item {
    flex: 1; min-width: 120px; padding: 8px 20px;
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 4px;
  }
  .stat-item:first-child { padding-left: 0; }
  .stat-item:last-child { border-right: none; }
  .stat-label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); }
  .stat-value { font-family: var(--font-mono); font-size: 22px; font-weight: bold; color: var(--accent); line-height: 1; }
  .stat-sub { font-size: 11px; color: var(--text-muted); }

  /* ── Rating Distribution ── */
  .rating-dist { display: flex; gap: 3px; align-items: flex-end; height: 28px; }
  .rd-bar-wrap { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .rd-bar {
    width: 14px; background: var(--accent-dim); border-radius: 2px 2px 0 0;
    min-height: 2px; transition: height 0.4s ease;
  }
  .rd-bar.active { background: var(--accent); }
  .rd-label { font-size: 9px; color: var(--text-muted); font-family: var(--font-mono); }

  /* ── Progress Bar ── */
  .progress-row { display: flex; align-items: center; gap: 10px; padding: 10px 28px; background: var(--surface); border-bottom: 1px solid var(--border); }
  .progress-bg { flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent-dim), var(--accent)); border-radius: 2px; transition: width 0.5s ease; }
  .progress-pct { font-family: var(--font-mono); font-size: 11px; color: var(--accent); white-space: nowrap; min-width: 36px; text-align: right; }

  /* ── Controls ── */
  .controls { padding: 14px 28px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; background: var(--bg); border-bottom: 1px solid var(--border); }
  .search-wrap { position: relative; flex: 1; min-width: 160px; max-width: 300px; }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; font-size: 14px; }
  .search-wrap input {
    width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: var(--r);
    color: var(--text); padding: 8px 12px 8px 32px; font-size: 13px; outline: none;
    transition: border-color var(--tr); font-family: var(--font-sans);
  }
  .search-wrap input:focus { border-color: var(--accent-dim); }
  .filter-btns { display: flex; gap: 3px; }
  .filter-btn {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--r);
    color: var(--text-muted); cursor: pointer; font-size: 12px; padding: 7px 14px;
    transition: all var(--tr); font-family: var(--font-sans);
  }
  .filter-btn:hover { border-color: var(--accent-dim); color: var(--text); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #0F0F0F; font-weight: 600; }
  .sort-select {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--r);
    color: var(--text-muted); cursor: pointer; font-size: 12px; padding: 7px 12px;
    outline: none; font-family: var(--font-sans);
  }

  /* ── Grid ── */
  .grid-wrap { padding: 20px 28px; max-width: 1400px; margin: 0 auto; }
  .results-label { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 14px; }
  .book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; }

  /* ── Card ── */
  .book-card {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--r);
    cursor: pointer; overflow: hidden; transition: transform var(--tr), border-color var(--tr), box-shadow var(--tr);
    position: relative;
  }
  .book-card:hover { transform: translateY(-3px) rotate(0.35deg); border-color: var(--accent-dim); box-shadow: 0 10px 28px rgba(0,0,0,0.5); }
  .book-card.is-read { border-color: var(--read-border); }
  .book-card.on-both::after {
    content: '★'; position: absolute; top: 8px; right: 8px; z-index: 3;
    background: rgba(200,169,81,0.15); border: 1px solid var(--accent-dim);
    border-radius: 3px; font-size: 9px; color: var(--accent); padding: 2px 5px;
  }
  .book-card.on-both.is-read::after { top: 34px; }
  .rank-badge {
    position: absolute; top: 8px; left: 8px; background: rgba(15,15,15,0.85);
    border: 1px solid var(--border); border-radius: 3px; font-family: var(--font-mono);
    font-size: 10px; color: var(--text-muted); padding: 2px 6px; z-index: 2; backdrop-filter: blur(4px);
  }
  .read-badge {
    position: absolute; top: 8px; right: 8px; background: var(--read-bg); border: 1px solid var(--read-border);
    border-radius: 3px; font-size: 10px; color: var(--read-text); padding: 2px 7px; z-index: 2;
    font-weight: 600; letter-spacing: 0.05em;
  }
  .book-card.on-both .read-badge { top: 34px; }
  .cover-wrap { aspect-ratio: 2/3; overflow: hidden; background: #2a2a2a; position: relative; }
  .cover-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; opacity: 0; transition: opacity 0.3s; }
  .cover-wrap img.loaded { opacity: 1; }
  .cover-placeholder {
    width: 100%; height: 100%; display: none; flex-direction: column;
    align-items: center; justify-content: center;
    background: linear-gradient(145deg, #2e2e2e, #383838); padding: 14px; text-align: center;
  }
  .cover-placeholder .ph-icon { font-size: 26px; opacity: 0.3; }
  .cover-placeholder .ph-title { font-family: var(--font-serif); font-size: 11px; color: var(--text-muted); line-height: 1.4; margin-top: 8px; }
  .card-body { padding: 10px; }
  .card-title { font-family: var(--font-serif); font-size: 12px; font-weight: bold; line-height: 1.35; margin-bottom: 2px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-author { font-size: 11px; color: var(--text-muted); margin-bottom: 7px; }
  .card-stars { display: flex; gap: 2px; margin-bottom: 4px; }
  .card-stars .star { font-size: 12px; color: var(--star-off); }
  .card-stars .star.on { color: var(--star-on); }
  .card-date { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
  .card-review-snippet { font-size: 11px; color: var(--text-muted); margin-top: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; font-style: italic; }
  .empty { text-align: center; padding: 60px 20px; color: var(--text-muted); font-family: var(--font-serif); font-size: 16px; grid-column: 1/-1; }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200;
    display: flex; align-items: center; justify-content: center; padding: 20px;
    backdrop-filter: blur(4px); opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    max-width: 540px; width: 100%; max-height: 90vh; overflow-y: auto;
    transform: translateY(10px); transition: transform 0.2s;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-header { display: flex; gap: 18px; padding: 22px; border-bottom: 1px solid var(--border); }
  .modal-cover { width: 80px; min-width: 80px; aspect-ratio: 2/3; object-fit: cover; border-radius: 3px; background: #2a2a2a; }
  .modal-cover-ph { width: 80px; min-width: 80px; aspect-ratio: 2/3; background: linear-gradient(145deg,#2e2e2e,#383838); border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 22px; opacity: 0.5; }
  .modal-meta { flex: 1; min-width: 0; }
  .modal-rank { font-family: var(--font-mono); font-size: 11px; color: var(--accent); margin-bottom: 5px; }
  .modal-title { font-family: var(--font-serif); font-size: 18px; font-weight: bold; line-height: 1.25; margin-bottom: 3px; }
  .modal-author { font-size: 13px; color: var(--text-muted); margin-bottom: 14px; }
  .modal-on-both { font-size: 11px; color: var(--accent); margin-bottom: 10px; }
  .read-toggle { display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; }
  .toggle-track { width: 36px; height: 19px; background: var(--border); border-radius: 10px; position: relative; transition: background var(--tr); flex-shrink: 0; }
  .toggle-track.on { background: var(--read-border); }
  .toggle-knob { width: 13px; height: 13px; background: var(--text-muted); border-radius: 50%; position: absolute; top: 3px; left: 3px; transition: left var(--tr), background var(--tr); }
  .toggle-track.on .toggle-knob { left: 20px; background: var(--read-text); }
  .toggle-label { font-size: 13px; color: var(--text-muted); }
  .toggle-track.on + .toggle-label { color: var(--read-text); }
  .modal-body { padding: 18px 22px 22px; display: flex; flex-direction: column; gap: 18px; }
  .field-group { display: flex; flex-direction: column; gap: 7px; }
  .field-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); }
  .star-input { display: flex; gap: 3px; }
  .star-input .s { font-size: 26px; cursor: pointer; color: var(--star-off); transition: color var(--tr), transform var(--tr); line-height: 1; }
  .star-input .s:hover, .star-input .s.on { color: var(--star-on); }
  .star-input .s:hover { transform: scale(1.15); }
  .date-input, .review-textarea {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--r);
    color: var(--text); padding: 9px 12px; font-size: 13px; font-family: var(--font-sans);
    outline: none; width: 100%; transition: border-color var(--tr);
  }
  .date-input { color-scheme: dark; }
  .date-input:focus, .review-textarea:focus { border-color: var(--accent-dim); }
  .review-textarea { resize: vertical; min-height: 90px; line-height: 1.6; }
  .review-textarea::placeholder { color: var(--text-muted); }
  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; border-top: 1px solid var(--border); padding: 14px 22px; }
  .btn { border-radius: var(--r); cursor: pointer; font-size: 13px; font-family: var(--font-sans); font-weight: 600; padding: 8px 18px; transition: all var(--tr); border: none; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
  .btn-ghost:hover { border-color: var(--text-muted); color: var(--text); }
  .btn-primary { background: var(--accent); color: #0F0F0F; }
  .btn-primary:hover { background: #D4B45E; }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 600px) {
    header, .stats-bar, .progress-row, .controls { padding-left: 16px; padding-right: 16px; }
    .grid-wrap { padding: 16px; }
    .book-grid { grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); gap: 10px; }
    .stat-item { min-width: 90px; padding: 6px 12px; }
    .stat-value { font-size: 18px; }
    .modal-header { flex-direction: column; }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>NYT Best Books <span>of the 21st Century</span></h1>
    <div class="list-tabs">
      <button class="list-tab active" data-list="critics" id="tabCritics">
        Critics' Pick <span class="tab-badge" id="criticsBadge">0/100</span>
      </button>
      <button class="list-tab" data-list="readers" id="tabReaders">
        Readers' Pick <span class="tab-badge" id="readersBadge">0/100</span>
      </button>
    </div>
    <div class="list-desc" id="listDesc">Voted by 503 novelists, critics &amp; writers</div>
  </div>
</header>

<!-- Stats -->
<div class="stats-bar" id="statsBar">
  <div class="stat-item">
    <div class="stat-label">Read</div>
    <div class="stat-value" id="statRead">0</div>
    <div class="stat-sub" id="statReadSub">of 100 books</div>
  </div>
  <div class="stat-item">
    <div class="stat-label">Avg Rating</div>
    <div class="stat-value" id="statAvg">—</div>
    <div class="stat-sub" id="statAvgSub">from rated books</div>
  </div>
  <div class="stat-item">
    <div class="stat-label">Rated</div>
    <div class="stat-value" id="statRated">0</div>
    <div class="stat-sub">books rated</div>
  </div>
  <div class="stat-item" style="flex:2; min-width:180px;">
    <div class="stat-label">Rating Breakdown</div>
    <div class="rating-dist" id="ratingDist">
      <div class="rd-bar-wrap"><div class="rd-bar" id="bar1" style="height:2px"></div><div class="rd-label">1★</div></div>
      <div class="rd-bar-wrap"><div class="rd-bar" id="bar2" style="height:2px"></div><div class="rd-label">2★</div></div>
      <div class="rd-bar-wrap"><div class="rd-bar" id="bar3" style="height:2px"></div><div class="rd-label">3★</div></div>
      <div class="rd-bar-wrap"><div class="rd-bar" id="bar4" style="height:2px"></div><div class="rd-label">4★</div></div>
      <div class="rd-bar-wrap"><div class="rd-bar" id="bar5" style="height:2px"></div><div class="rd-label">5★</div></div>
    </div>
    <div class="stat-sub" id="statDistSub"></div>
  </div>
</div>

<div class="progress-row">
  <div class="progress-bg"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="progress-pct" id="progressPct">0%</div>
</div>

<!-- Controls -->
<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="searchInput" placeholder="Search title or author…">
  </div>
  <div class="filter-btns">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="read">Read</button>
    <button class="filter-btn" data-filter="unread">Unread</button>
  </div>
  <select class="sort-select" id="sortSelect">
    <option value="rank">Sort: Rank</option>
    <option value="rating">Sort: Rating</option>
    <option value="date">Sort: Date Read</option>
    <option value="alpha">Sort: A–Z</option>
  </select>
</div>

<div class="grid-wrap">
  <div class="results-label" id="resultsLabel"></div>
  <div class="book-grid" id="bookGrid"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <div id="modalCoverWrap"></div>
      <div class="modal-meta">
        <div class="modal-rank" id="modalRank"></div>
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-author" id="modalAuthor"></div>
        <div class="modal-on-both" id="modalOnBoth" style="display:none"></div>
        <label class="read-toggle" id="readToggle">
          <div class="toggle-track" id="toggleTrack"><div class="toggle-knob"></div></div>
          <span class="toggle-label" id="toggleLabel">Mark as read</span>
        </label>
      </div>
    </div>
    <div class="modal-body">
      <div class="field-group">
        <div class="field-label">Your Rating</div>
        <div class="star-input" id="starInput">
          <span class="s" data-v="1">★</span><span class="s" data-v="2">★</span>
          <span class="s" data-v="3">★</span><span class="s" data-v="4">★</span>
          <span class="s" data-v="5">★</span>
        </div>
      </div>
      <div class="field-group">
        <label class="field-label" for="dateInput">Date Read</label>
        <input type="date" id="dateInput" class="date-input">
      </div>
      <div class="field-group">
        <label class="field-label" for="reviewInput">Review / Notes</label>
        <textarea id="reviewInput" class="review-textarea" placeholder="What did you think? Any favourite passages, notes, or thoughts…"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="modalCancel">Cancel</button>
      <button class="btn btn-primary" id="modalSave">Save</button>
    </div>
  </div>
</div>

// Build lookup for cross-list detection (normalised key)
function normKey(title, author) { return (title+author).toLowerCase().replace(/[^a-z0-9]/g,''); }
const criticsKeys = new Set(CRITICS.map(b => normKey(b.title, b.author)));
const readersKeys = new Set(READERS.map(b => normKey(b.title, b.author)));
// Map from normKey -> canonical isbn (use critics isbn as source of truth)
const canonicalIsbn = {};
CRITICS.forEach(b => { canonicalIsbn[normKey(b.title, b.author)] = b.isbn; });

function isOnBothLists(book) {
  const k = normKey(book.title, book.author);
  return criticsKeys.has(k) && readersKeys.has(k);
}

// ── State ─────────────────────────────────────────────────────────
const STORAGE_KEY = 'nyt100_v2';
let userData = {};
let currentList = 'critics';
let currentFilter = 'all';
let currentSort = 'rank';
let searchQuery = '';
let modalBookKey = null; // normKey
let modalRating = 0;
let tempRead = false;

function loadData() { try { userData = JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}'); } catch { userData={}; } }
function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(userData)); }
function getEntry(key) { return userData[key] || {read:false,rating:0,date:'',review:''}; }

// ── Cover ─────────────────────────────────────────────────────────
function coverUrl(isbn) { return `https://covers.openlibrary.org/b/isbn/${isbn}-M.jpg`; }

// ── Stats ─────────────────────────────────────────────────────────
function renderStats() {
  const list = currentList === 'critics' ? CRITICS : READERS;
  const entries = list.map(b => getEntry(normKey(b.title, b.author)));
  const read = entries.filter(e => e.read).length;
  const rated = entries.filter(e => e.rating > 0);
  const avg = rated.length ? (rated.reduce((s,e)=>s+e.rating,0)/rated.length).toFixed(1) : null;

  document.getElementById('statRead').textContent = read;
  document.getElementById('statReadSub').textContent = `of ${list.length} books`;
  document.getElementById('statAvg').textContent = avg ? avg + '★' : '—';
  document.getElementById('statAvgSub').textContent = rated.length ? `from ${rated.length} rated` : 'no ratings yet';
  document.getElementById('statRated').textContent = rated.length;

  const dist = [0,0,0,0,0];
  rated.forEach(e => dist[e.rating-1]++);
  const maxDist = Math.max(...dist, 1);
  for (let i=1;i<=5;i++) {
    const bar = document.getElementById('bar'+i);
    const h = Math.round((dist[i-1]/maxDist)*24)+2;
    bar.style.height = h+'px';
    bar.classList.toggle('active', dist[i-1] > 0);
  }
  document.getElementById('statDistSub').textContent = dist.some(d=>d>0) ? dist.map((d,i)=>`${i+1}★:${d}`).filter((_,i)=>dist[i]>0).join(' · ') : 'no ratings yet';

  const pct = Math.round((read/list.length)*100);
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressPct').textContent = pct+'%';

  // Badge updates
  const critRead = CRITICS.filter(b=>getEntry(normKey(b.title,b.author)).read).length;
  const readRead = READERS.filter(b=>getEntry(normKey(b.title,b.author)).read).length;
  document.getElementById('criticsBadge').textContent = `${critRead}/100`;
  document.getElementById('readersBadge').textContent = `${readRead}/100`;
}

// ── Grid ──────────────────────────────────────────────────────────
function starsHtml(n) {
  return Array.from({length:5},(_,i)=>`<span class="star${i<n?' on':''}">${'★'}</span>`).join('');
}
function formatDate(d) {
  if (!d) return '';
  const [y,m,day] = d.split('-');
  return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+m-1]+` ${+day}, ${y}`;
}

function getListFiltered() {
  const list = currentList === 'critics' ? CRITICS : READERS;
  let res = list.slice();
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    res = res.filter(b => b.title.toLowerCase().includes(q) || b.author.toLowerCase().includes(q));
  }
  if (currentFilter==='read') res = res.filter(b=>getEntry(normKey(b.title,b.author)).read);
  if (currentFilter==='unread') res = res.filter(b=>!getEntry(normKey(b.title,b.author)).read);
  res.sort((a,b)=>{
    if (currentSort==='rank') return a.rank-b.rank;
    if (currentSort==='rating') { const ra=getEntry(normKey(a.title,a.author)).rating||0, rb=getEntry(normKey(b.title,b.author)).rating||0; return rb-ra||a.rank-b.rank; }
    if (currentSort==='date') { const da=getEntry(normKey(a.title,a.author)).date||'', db=getEntry(normKey(b.title,b.author)).date||''; if(!da&&!db)return a.rank-b.rank; if(!da)return 1; if(!db)return -1; return db<da?-1:db>da?1:0; }
    if (currentSort==='alpha') return a.title.localeCompare(b.title);
    return 0;
  });
  return res;
}

function renderGrid() {
  const grid = document.getElementById('bookGrid');
  const list = getListFiltered();
  document.getElementById('resultsLabel').textContent = `Showing ${list.length} of ${(currentList==='critics'?CRITICS:READERS).length} books`;
  if (!list.length) { grid.innerHTML='<div class="empty">No books match your search.</div>'; return; }

  grid.innerHTML = list.map(book=>{
    const key = normKey(book.title, book.author);
    const entry = getEntry(key);
    const both = isOnBothLists(book);
    const url = coverUrl(book.isbn);
    return `<div class="book-card${entry.read?' is-read':''}${both?' on-both':''}" data-key="${key}" tabindex="0" role="button">
      <div class="rank-badge">#${book.rank}</div>
      ${entry.read?'<div class="read-badge">READ</div>':''}
      <div class="cover-wrap">
        <img src="${url}" alt="" loading="lazy"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
          onload="this.classList.add('loaded')">
        <div class="cover-placeholder" style="display:none"><span class="ph-icon">📖</span><span class="ph-title">${book.title}</span></div>
      </div>
      <div class="card-body">
        <div class="card-title">${book.title}</div>
        <div class="card-author">${book.author}</div>
        <div class="card-stars">${starsHtml(entry.rating)}</div>
        ${entry.date?`<div class="card-date">${formatDate(entry.date)}</div>`:''}
        ${entry.review?`<div class="card-review-snippet">"${entry.review}"</div>`:''}
      </div>
    </div>`;
  }).join('');

  grid.querySelectorAll('.book-card').forEach(card=>{
    const handler = ()=>openModal(card.dataset.key);
    card.addEventListener('click', handler);
    card.addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' ') handler(); });
  });
}

// ── Modal ─────────────────────────────────────────────────────────
function openModal(key) {
  const list = currentList==='critics'?CRITICS:READERS;
  const book = list.find(b=>normKey(b.title,b.author)===key);
  if (!book) return;
  const entry = getEntry(key);
  modalBookKey = key;
  modalRating = entry.rating;
  tempRead = entry.read;

  const onBoth = isOnBothLists(book);
  const otherList = currentList==='critics'?'Readers\' Pick':'Critics\' Pick';
  const otherRank = onBoth ? (currentList==='critics'?READERS:CRITICS).find(b=>normKey(b.title,b.author)===key)?.rank : null;

  document.getElementById('modalRank').textContent = `#${book.rank} on the ${currentList==='critics'?"Critics'":"Readers'"} list`;
  document.getElementById('modalTitle').textContent = book.title;
  document.getElementById('modalAuthor').textContent = book.author;
  const onBothEl = document.getElementById('modalOnBoth');
  if (onBoth) { onBothEl.style.display='block'; onBothEl.textContent = `★ Also #${otherRank} on the ${otherList}`; }
  else { onBothEl.style.display='none'; }

  const wrap = document.getElementById('modalCoverWrap');
  wrap.innerHTML = `<img class="modal-cover" src="${coverUrl(book.isbn)}" alt=""
    onerror="this.style.display='none';document.getElementById('mPh').style.display='flex'"
    onload="this.style.opacity=1">
    <div class="modal-cover-ph" id="mPh" style="display:none">📖</div>`;

  updateToggle(tempRead);
  updateModalStars(modalRating);
  document.getElementById('dateInput').value = entry.date||'';
  document.getElementById('reviewInput').value = entry.review||'';
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow='';
  modalBookKey=null;
}

function updateToggle(on) {
  tempRead=on;
  document.getElementById('toggleTrack').classList.toggle('on',on);
  document.getElementById('toggleLabel').textContent = on ? 'Marked as read' : 'Mark as read';
}

function updateModalStars(v) {
  modalRating=v;
  document.querySelectorAll('#starInput .s').forEach(s=>s.classList.toggle('on',+s.dataset.v<=v));
}

function saveModal() {
  if (!modalBookKey) return;
  // Save under canonical key — so both lists share the same data
  userData[modalBookKey] = { read:tempRead, rating:modalRating, date:document.getElementById('dateInput').value, review:document.getElementById('reviewInput').value.trim() };
  saveData();
  closeModal();
  renderStats();
  renderGrid();
}

// ── Event wiring ──────────────────────────────────────────────────
document.getElementById('readToggle').addEventListener('click',()=>updateToggle(!tempRead));
document.querySelectorAll('#starInput .s').forEach(s=>{
  s.addEventListener('click',()=>updateModalStars(+s.dataset.v===modalRating?0:+s.dataset.v));
  s.addEventListener('mouseover',()=>document.querySelectorAll('#starInput .s').forEach(x=>x.classList.toggle('on',+x.dataset.v<=+s.dataset.v)));
  s.addEventListener('mouseleave',()=>updateModalStars(modalRating));
});
document.getElementById('modalSave').addEventListener('click',saveModal);
document.getElementById('modalCancel').addEventListener('click',closeModal);
document.getElementById('modalOverlay').addEventListener('click',e=>{ if(e.target===document.getElementById('modalOverlay'))closeModal(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape')closeModal(); });

document.querySelectorAll('.list-tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.list-tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    currentList = tab.dataset.list;
    document.getElementById('listDesc').textContent = currentList==='critics'
      ? 'Voted by 503 novelists, critics & writers'
      : 'Readers\' picks — 39 books overlap with the critics\' list';
    renderStats(); renderGrid();
  });
});
document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active'); currentFilter=btn.dataset.filter; renderGrid();
  });
});
document.getElementById('sortSelect').addEventListener('change',e=>{ currentSort=e.target.value; renderGrid(); });
document.getElementById('searchInput').addEventListener('input',e=>{ searchQuery=e.target.value.trim(); renderGrid(); });

// ── Init ──────────────────────────────────────────────────────────
loadData(); renderStats(); renderGrid();
</script>
</body>
</html>
