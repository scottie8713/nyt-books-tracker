<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NYT 100 Best Books of the 21st Century</title>
<style>
  :root {
    --bg: #0F0F0F;
    --surface: #181818;
    --card: #1E1E1E;
    --card-hover: #252525;
    --accent: #C8A951;
    --accent-dim: #8A7236;
    --text: #F0EDE6;
    --text-muted: #7A7570;
    --border: #2A2A2A;
    --read-bg: #1A2E1A;
    --read-border: #2E5E2E;
    --read-text: #6BBF6B;
    --star-on: #C8A951;
    --star-off: #3A3A3A;
    --font-display: Georgia, 'Times New Roman', serif;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --font-mono: 'Courier New', monospace;
    --radius: 6px;
    --transition: 0.18s ease;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 28px 32px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-top {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  h1 {
    font-family: var(--font-display);
    font-size: clamp(18px, 3vw, 26px);
    font-weight: normal;
    letter-spacing: 0.02em;
    color: var(--text);
  }

  h1 span {
    color: var(--accent);
  }

  .header-meta {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-muted);
    margin-left: auto;
  }

  /* ── Progress Bar ── */
  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .progress-bar-bg {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-dim), var(--accent));
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .progress-label {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--accent);
    white-space: nowrap;
    min-width: 80px;
    text-align: right;
  }

  /* ── Controls ── */
  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 180px;
    max-width: 320px;
  }

  .search-wrap input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 8px 12px 8px 34px;
    font-size: 13px;
    font-family: var(--font-body);
    outline: none;
    transition: border-color var(--transition);
  }

  .search-wrap input:focus {
    border-color: var(--accent-dim);
  }

  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
    font-size: 14px;
  }

  .filter-btns {
    display: flex;
    gap: 4px;
  }

  .filter-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-muted);
    cursor: pointer;
    font-size: 12px;
    padding: 7px 14px;
    transition: all var(--transition);
    font-family: var(--font-body);
  }

  .filter-btn:hover {
    border-color: var(--accent-dim);
    color: var(--text);
  }

  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #0F0F0F;
    font-weight: 600;
  }

  .sort-select {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-muted);
    cursor: pointer;
    font-size: 12px;
    padding: 7px 12px;
    outline: none;
    font-family: var(--font-body);
  }

  /* ── Grid ── */
  .grid-wrap {
    padding: 28px 32px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .results-label {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .book-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
  }

  /* ── Book Card ── */
  .book-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    overflow: hidden;
    transition: transform var(--transition), border-color var(--transition), box-shadow var(--transition);
    position: relative;
  }

  .book-card:hover {
    transform: translateY(-3px) rotate(0.4deg);
    border-color: var(--accent-dim);
    box-shadow: 0 12px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(200,169,81,0.15);
  }

  .book-card.is-read {
    border-color: var(--read-border);
  }

  .rank-badge {
    position: absolute;
    top: 8px;
    left: 8px;
    background: rgba(15,15,15,0.85);
    border: 1px solid var(--border);
    border-radius: 3px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
    padding: 2px 6px;
    z-index: 2;
    backdrop-filter: blur(4px);
  }

  .read-badge {
    position: absolute;
    top: 8px;
    right: 8px;
    background: var(--read-bg);
    border: 1px solid var(--read-border);
    border-radius: 3px;
    font-size: 10px;
    color: var(--read-text);
    padding: 2px 7px;
    z-index: 2;
    font-weight: 600;
    letter-spacing: 0.05em;
  }

  .cover-wrap {
    aspect-ratio: 2/3;
    overflow: hidden;
    background: #111;
    position: relative;
  }

  .cover-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: opacity 0.3s ease;
  }

  .cover-wrap img.loading {
    opacity: 0;
  }

  .cover-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(145deg, #1a1a1a, #222);
    padding: 16px;
    text-align: center;
  }

  .cover-placeholder .ph-title {
    font-family: var(--font-display);
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.4;
    margin-top: 10px;
  }

  .cover-placeholder .ph-icon {
    font-size: 28px;
    opacity: 0.3;
  }

  .card-body {
    padding: 12px;
  }

  .card-title {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: bold;
    line-height: 1.35;
    color: var(--text);
    margin-bottom: 3px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-author {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .card-stars {
    display: flex;
    gap: 2px;
    margin-bottom: 6px;
  }

  .card-stars .star {
    font-size: 13px;
    color: var(--star-off);
  }

  .card-stars .star.on {
    color: var(--star-on);
  }

  .card-date {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
  }

  .card-review-snippet {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 5px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    font-style: italic;
  }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(4px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    max-width: 560px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    transform: translateY(12px);
    transition: transform 0.2s ease;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .modal-overlay.open .modal {
    transform: translateY(0);
  }

  .modal-header {
    display: flex;
    gap: 20px;
    padding: 24px;
    border-bottom: 1px solid var(--border);
  }

  .modal-cover {
    width: 90px;
    min-width: 90px;
    aspect-ratio: 2/3;
    object-fit: cover;
    border-radius: 3px;
    background: #111;
  }

  .modal-cover-placeholder {
    width: 90px;
    min-width: 90px;
    aspect-ratio: 2/3;
    background: linear-gradient(145deg, #1a1a1a, #222);
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    opacity: 0.4;
  }

  .modal-meta {
    flex: 1;
    min-width: 0;
  }

  .modal-rank {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--accent);
    margin-bottom: 6px;
  }

  .modal-title {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: bold;
    line-height: 1.25;
    margin-bottom: 4px;
  }

  .modal-author {
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 16px;
  }

  .modal-read-toggle {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    user-select: none;
  }

  .toggle-track {
    width: 38px;
    height: 20px;
    background: var(--border);
    border-radius: 10px;
    position: relative;
    transition: background var(--transition);
    flex-shrink: 0;
  }

  .toggle-track.on {
    background: var(--read-border);
  }

  .toggle-knob {
    width: 14px;
    height: 14px;
    background: var(--text-muted);
    border-radius: 50%;
    position: absolute;
    top: 3px;
    left: 3px;
    transition: left var(--transition), background var(--transition);
  }

  .toggle-track.on .toggle-knob {
    left: 21px;
    background: var(--read-text);
  }

  .toggle-label {
    font-size: 13px;
    color: var(--text-muted);
  }

  .toggle-track.on + .toggle-label {
    color: var(--read-text);
  }

  .modal-body {
    padding: 20px 24px 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .field-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .field-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  /* ── Star Rating Input ── */
  .star-input {
    display: flex;
    gap: 4px;
  }

  .star-input .s {
    font-size: 26px;
    cursor: pointer;
    color: var(--star-off);
    transition: color var(--transition), transform var(--transition);
    line-height: 1;
  }

  .star-input .s:hover,
  .star-input .s.on {
    color: var(--star-on);
  }

  .star-input .s:hover {
    transform: scale(1.15);
  }

  .star-input .s.on ~ .s {
    color: var(--star-off);
  }

  /* ── Date Input ── */
  .date-input {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 9px 12px;
    font-size: 13px;
    font-family: var(--font-body);
    outline: none;
    width: 100%;
    transition: border-color var(--transition);
    color-scheme: dark;
  }

  .date-input:focus {
    border-color: var(--accent-dim);
  }

  /* ── Textarea ── */
  .review-textarea {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 10px 12px;
    font-size: 13px;
    font-family: var(--font-body);
    outline: none;
    resize: vertical;
    width: 100%;
    min-height: 100px;
    line-height: 1.6;
    transition: border-color var(--transition);
  }

  .review-textarea:focus {
    border-color: var(--accent-dim);
  }

  .review-textarea::placeholder {
    color: var(--text-muted);
  }

  /* ── Modal Footer ── */
  .modal-footer {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    border-top: 1px solid var(--border);
    padding: 16px 24px;
  }

  .btn {
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 13px;
    font-family: var(--font-body);
    font-weight: 600;
    padding: 9px 20px;
    transition: all var(--transition);
    border: none;
  }

  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
  }

  .btn-ghost:hover {
    border-color: var(--text-muted);
    color: var(--text);
  }

  .btn-primary {
    background: var(--accent);
    color: #0F0F0F;
  }

  .btn-primary:hover {
    background: #D4B45E;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── Empty state ── */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
    font-family: var(--font-display);
    font-size: 16px;
    grid-column: 1/-1;
  }

  @media (max-width: 600px) {
    header { padding: 16px; }
    .grid-wrap { padding: 16px; }
    .book-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
    .modal-header { flex-direction: column; gap: 14px; }
    .modal-cover, .modal-cover-placeholder { width: 70px; min-width: 70px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>NYT 100 Best Books <span>of the 21st Century</span></h1>
    <div class="header-meta" id="headerMeta">0 of 100 read</div>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="progress-label" id="progressLabel">0%</div>
  </div>
  <div class="controls">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="searchInput" placeholder="Search title or author…">
    </div>
    <div class="filter-btns">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="read">Read</button>
      <button class="filter-btn" data-filter="unread">Unread</button>
    </div>
    <select class="sort-select" id="sortSelect">
      <option value="rank">Sort: Rank</option>
      <option value="rating">Sort: Rating</option>
      <option value="date">Sort: Date Read</option>
      <option value="alpha">Sort: A–Z</option>
    </select>
  </div>
</header>

<div class="grid-wrap">
  <div class="results-label" id="resultsLabel"></div>
  <div class="book-grid" id="bookGrid"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div id="modalCoverWrap"></div>
      <div class="modal-meta">
        <div class="modal-rank" id="modalRank"></div>
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-author" id="modalAuthor"></div>
        <label class="modal-read-toggle" id="readToggle">
          <div class="toggle-track" id="toggleTrack">
            <div class="toggle-knob"></div>
          </div>
          <span class="toggle-label" id="toggleLabel">Mark as read</span>
        </label>
      </div>
    </div>
    <div class="modal-body">
      <div class="field-group" id="ratingGroup">
        <div class="field-label">Your Rating</div>
        <div class="star-input" id="starInput">
          <span class="s" data-v="1">★</span>
          <span class="s" data-v="2">★</span>
          <span class="s" data-v="3">★</span>
          <span class="s" data-v="4">★</span>
          <span class="s" data-v="5">★</span>
        </div>
      </div>
      <div class="field-group" id="dateGroup">
        <label class="field-label" for="dateInput">Date Read</label>
        <input type="date" id="dateInput" class="date-input">
      </div>
      <div class="field-group">
        <label class="field-label" for="reviewInput">Review / Notes</label>
        <textarea id="reviewInput" class="review-textarea" placeholder="What did you think? Any favourite passages, notes, or thoughts…"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="modalCancel">Cancel</button>
      <button class="btn btn-primary" id="modalSave">Save</button>
    </div>
  </div>
</div>

  { rank: 99, title: "Bewilderment", author: "Richard Powers", isbn: "9780393881141" },
  { rank: 100, title: "The Topeka School", author: "Ben Lerner", isbn: "9780374277901" },
];

const STORAGE_KEY = 'nyt100_tracker_v1';

// ── State ──────────────────────────────────────────────────────────
let userData = {};
let currentFilter = 'all';
let currentSort = 'rank';
let searchQuery = '';
let modalBookRank = null;
let modalRating = 0;
let tempRead = false;

function loadData() {
  try { userData = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
  catch { userData = {}; }
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(userData));
}

function getEntry(rank) {
  return userData[rank] || { read: false, rating: 0, date: '', review: '' };
}

// ── Cover URL ──────────────────────────────────────────────────────
function coverUrl(isbn) {
  return `https://covers.openlibrary.org/b/isbn/${isbn}-M.jpg`;
}

// ── Render ─────────────────────────────────────────────────────────
function starsHtml(n, small = true) {
  let h = '';
  for (let i = 1; i <= 5; i++) {
    h += `<span class="star${i <= n ? ' on' : ''}">${small ? '★' : '★'}</span>`;
  }
  return h;
}

function renderProgress() {
  const total = BOOKS.length;
  const read = BOOKS.filter(b => getEntry(b.rank).read).length;
  const pct = Math.round((read / total) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = pct + '%';
  document.getElementById('headerMeta').textContent = `${read} of ${total} read`;
}

function getFilteredSorted() {
  let list = BOOKS.slice();

  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(b => b.title.toLowerCase().includes(q) || b.author.toLowerCase().includes(q));
  }

  if (currentFilter === 'read') list = list.filter(b => getEntry(b.rank).read);
  if (currentFilter === 'unread') list = list.filter(b => !getEntry(b.rank).read);

  list.sort((a, b) => {
    if (currentSort === 'rank') return a.rank - b.rank;
    if (currentSort === 'rating') {
      const ra = getEntry(a.rank).rating || 0;
      const rb = getEntry(b.rank).rating || 0;
      return rb - ra || a.rank - b.rank;
    }
    if (currentSort === 'date') {
      const da = getEntry(a.rank).date || '';
      const db = getEntry(b.rank).date || '';
      if (!da && !db) return a.rank - b.rank;
      if (!da) return 1;
      if (!db) return -1;
      return db < da ? -1 : db > da ? 1 : 0;
    }
    if (currentSort === 'alpha') return a.title.localeCompare(b.title);
    return 0;
  });

  return list;
}

function renderGrid() {
  const grid = document.getElementById('bookGrid');
  const list = getFilteredSorted();
  document.getElementById('resultsLabel').textContent = `Showing ${list.length} of ${BOOKS.length} books`;

  if (!list.length) {
    grid.innerHTML = '<div class="empty">No books match your search.</div>';
    return;
  }

  grid.innerHTML = list.map(book => {
    const entry = getEntry(book.rank);
    const url = coverUrl(book.isbn);
    return `
      <div class="book-card${entry.read ? ' is-read' : ''}" data-rank="${book.rank}" tabindex="0" role="button" aria-label="${book.title}">
        <div class="rank-badge">#${book.rank}</div>
        ${entry.read ? '<div class="read-badge">READ</div>' : ''}
        <div class="cover-wrap">
          <img
            src="${url}"
            alt="${book.title} cover"
            loading="lazy"
            class="loading"
            onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
            onload="this.classList.remove('loading')"
          >
          <div class="cover-placeholder" style="display:none">
            <span class="ph-icon">📖</span>
            <span class="ph-title">${book.title}</span>
          </div>
        </div>
        <div class="card-body">
          <div class="card-title">${book.title}</div>
          <div class="card-author">${book.author}</div>
          <div class="card-stars">${starsHtml(entry.rating)}</div>
          ${entry.date ? `<div class="card-date">${formatDate(entry.date)}</div>` : ''}
          ${entry.review ? `<div class="card-review-snippet">"${entry.review}"</div>` : ''}
        </div>
      </div>`;
  }).join('');

  grid.querySelectorAll('.book-card').forEach(card => {
    card.addEventListener('click', () => openModal(+card.dataset.rank));
    card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') openModal(+card.dataset.rank); });
  });
}

function formatDate(d) {
  if (!d) return '';
  const [y, m, day] = d.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[+m-1]} ${+day}, ${y}`;
}

// ── Modal ──────────────────────────────────────────────────────────
function openModal(rank) {
  const book = BOOKS.find(b => b.rank === rank);
  const entry = getEntry(rank);
  modalBookRank = rank;
  modalRating = entry.rating;
  tempRead = entry.read;

  document.getElementById('modalRank').textContent = `#${rank} on the NYT list`;
  document.getElementById('modalTitle').textContent = book.title;
  document.getElementById('modalAuthor').textContent = book.author;

  // Cover
  const wrap = document.getElementById('modalCoverWrap');
  const url = coverUrl(book.isbn);
  wrap.innerHTML = `
    <img class="modal-cover" src="${url}" alt="${book.title} cover"
      onerror="this.style.display='none';document.getElementById('modalCoverFallback').style.display='flex'"
      onload="this.style.opacity=1">
    <div class="modal-cover-placeholder" id="modalCoverFallback" style="display:none">📖</div>`;

  // Read toggle
  updateToggle(tempRead);

  // Stars
  updateModalStars(modalRating);

  // Date
  document.getElementById('dateInput').value = entry.date || '';

  // Review
  document.getElementById('reviewInput').value = entry.review || '';

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
  modalBookRank = null;
}

function updateToggle(isRead) {
  tempRead = isRead;
  const track = document.getElementById('toggleTrack');
  const label = document.getElementById('toggleLabel');
  if (isRead) {
    track.classList.add('on');
    label.textContent = 'Marked as read';
  } else {
    track.classList.remove('on');
    label.textContent = 'Mark as read';
  }
}

function updateModalStars(val) {
  modalRating = val;
  document.querySelectorAll('#starInput .s').forEach(s => {
    s.classList.toggle('on', +s.dataset.v <= val);
  });
}

function saveModal() {
  if (modalBookRank === null) return;
  userData[modalBookRank] = {
    read: tempRead,
    rating: modalRating,
    date: document.getElementById('dateInput').value,
    review: document.getElementById('reviewInput').value.trim(),
  };
  saveData();
  closeModal();
  renderProgress();
  renderGrid();
}

// ── Event listeners ────────────────────────────────────────────────
document.getElementById('readToggle').addEventListener('click', () => updateToggle(!tempRead));

document.querySelectorAll('#starInput .s').forEach(s => {
  s.addEventListener('click', () => updateModalStars(+s.dataset.v === modalRating ? 0 : +s.dataset.v));
  s.addEventListener('mouseover', () => {
    document.querySelectorAll('#starInput .s').forEach(x => x.classList.toggle('on', +x.dataset.v <= +s.dataset.v));
  });
  s.addEventListener('mouseleave', () => updateModalStars(modalRating));
});

document.getElementById('modalSave').addEventListener('click', saveModal);
document.getElementById('modalCancel').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderGrid();
  });
});

document.getElementById('sortSelect').addEventListener('change', e => {
  currentSort = e.target.value;
  renderGrid();
});

document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  renderGrid();
});

// ── Init ──────────────────────────────────────────────────────────
loadData();
renderProgress();
renderGrid();
</script>
